<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمشة بلس | اشتراكات رقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b0b0e;
            color: #ffffff;
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 25, 45, 0.6) 0%, rgba(15, 15, 20, 0.8) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .whatsapp-btn {
            background-color: #25d366;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .whatsapp-btn:hover {
            background-color: #22bf5b;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-8">

    <!-- المحتوى الرئيسي -->
    <div class="w-full max-w-md mx-auto px-4 pt-8 space-y-6">
        
        <!-- الهيدر والشعار الأساسي -->
        <header class="text-center space-y-3">
            <div class="w-32 h-32 mx-auto rounded-3xl overflow-hidden shadow-2xl border border-purple-500/30 bg-[#121218]">
                <img src="E372B55E-7833-4789-8A55-99A31DC1F3DC.png" alt="شعار رمشة" class="w-full h-full object-cover">
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-wide text-white mb-1">رمشة بلس</h1>
                <p class="text-xs text-purple-300/80 font-medium">اشتراكات رقمية بأسعار مميزة</p>
            </div>
        </header>

        <!-- قائمة المنتجات والبطاقات -->
        <main class="space-y-4">
            
            <!-- بطاقة Netflix -->
            <div class="glass-card rounded-2xl p-5 shadow-xl relative overflow-hidden">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-white mb-1">Netflix</h2>
                        <p class="text-xs text-gray-400">اشتراكات نتفليكس رسمية وضمان كامل</p>
                    </div>
                    <span class="text-3xl font-black text-gray-600/40 tracking-tighter">N</span>
                </div>
                <div class="flex items-center justify-between pt-3 border-t border-gray-800/60">
                    <span class="text-[10px] font-bold text-red-500 bg-red-500/10 px-2.5 py-1 rounded-md tracking-wider">NETFLIX</span>
                    <a class="whatsapp-btn text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5" href="https://wa.me/966501286453?text=مرحباً،%20أرغب%20في%20طلب%20اشتراك%20نتفليكس" target="_blank">
                        اطلب الآن عبر واتساب
                    </a>
                </div>
            </div>

            <!-- بطاقة Shahid VIP -->
            <div class="glass-card rounded-2xl p-5 shadow-xl relative overflow-hidden">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-white mb-1">Shahid VIP</h2>
                        <p class="text-xs text-gray-400">اشتراكات شاهد وشاهد رياضة</p>
                    </div>
                    <span class="text-2xl font-black text-gray-600/40 tracking-tighter">ش</span>
                </div>
                <div class="flex items-center justify-between pt-3 border-t border-gray-800/60">
                    <span class="text-[10px] font-bold text-green-500 bg-green-500/10 px-2.5 py-1 rounded-md tracking-wider">SHAHID</span>
                    <a class="whatsapp-btn text-xs font-bold px-4 py-2 rounded-xl flex items-center gap-1.5" href="https://wa.me/966501286453?text=مرحباً،%20أرغب%20في%20طلب%20اشتراك%20شاهد" target="_blank">
                        اطلب الآن عبر واتساب
                    </a>
                </div>
            </div>

        </main>

    </div>

    <!-- الفوتر -->
    <footer class="mt-12 text-center text-[11px] text-gray-500">
        جميع الحقوق محفوظة &copy; 2026 رمشة بلس
    </footer>

</body>
</html>
